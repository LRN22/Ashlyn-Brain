<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Moof" />
  <meta name="theme-color" content="#0a0e27" />
  <title>Moof — Ashlyn's Brain</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="icon" type="image/png" href="icon.png" />
  <style>
    :root {
      --bg: #0a0e27;
      --cyan: #00d4ff;
      --text: #f2fcff;
      --muted: #9fe9ff;
      --card: rgba(0, 212, 255, 0.12);
      --danger: #ff9a4d;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden; user-select: none;
    }
    button, input, select { font: inherit; }

    /* ===== LANDING ===== */
    #landing {
      min-height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 28px 20px;
      text-align: center; overflow-y: auto;
    }
    #landing img {
      width: 128px; height: 128px; border-radius: 50%; object-fit: cover;
      border: 3px solid var(--cyan); box-shadow: 0 0 28px rgba(0,212,255,.45);
      margin-bottom: 14px;
    }
    #landing h1 { margin: 0 0 8px; font-size: 32px; font-weight: 900; color: var(--text); }
    #landing p { margin: 0 0 22px; max-width: 340px; font-size: 17px; font-weight: 700; color: var(--muted); line-height: 1.35; }
    #landing input, #landing select {
      width: min(100%, 340px); margin: 0 0 12px; padding: 14px 16px;
      border-radius: 18px; border: 1px solid rgba(0,212,255,.5);
      background: rgba(0,0,0,.4); color: #fff; font-size: 18px; font-weight: 700; text-align: center;
    }
    .btn-primary {
      width: min(100%, 340px); padding: 16px 18px; border: 0; border-radius: 18px;
      background: var(--cyan); color: #041018; font-size: 20px; font-weight: 900; cursor: pointer;
    }
    .btn-secondary {
      width: min(100%, 340px); margin-top: 12px; padding: 16px 18px; border-radius: 18px;
      border: 2px solid rgba(255,107,200,.55); background: rgba(255,107,200,.14);
      color: #ffd0ef; font-size: 18px; font-weight: 900; cursor: pointer;
    }

    /* ===== MAIN ===== */
    #app { display: none; height: 100%; flex-direction: column; }
    #app.on { display: flex; }
    .top {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 14px 8px; gap: 8px;
    }
    .top button {
      background: var(--card); border: 1px solid rgba(0,212,255,.45);
      color: var(--text); border-radius: 16px; padding: 10px 12px;
      font-size: 15px; font-weight: 800; cursor: pointer;
    }
    .clock { font-size: 15px; font-weight: 700; color: var(--muted); }

    .stage {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 8px 16px 12px; min-height: 0;
    }
    .face-wrap {
      position: relative; width: min(72vw, 300px); height: min(72vw, 300px);
      border-radius: 50%; cursor: pointer;
    }
    .face-wrap img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
      background: #08101f; display: block;
      filter: drop-shadow(0 0 24px rgba(0,212,255,.4));
      transition: filter .2s, transform .15s;
    }
    .face-wrap.idle img { animation: float 4s ease-in-out infinite; }
    .face-wrap.listening img { filter: drop-shadow(0 0 30px rgba(255,140,0,.75)); }
    .face-wrap.thinking img { filter: drop-shadow(0 0 30px rgba(255,215,0,.7)); }
    .face-wrap.speaking img {
      filter: drop-shadow(0 0 32px rgba(0,255,136,.85));
      animation: bob .28s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    @keyframes bob {
      0%,100%{transform:translateY(0) scale(1)}
      50%{transform:translateY(3px) scale(1.02,.97)}
    }

    /* simple mouth only while speaking — no continuous talk counter */
    .mouth {
      position: absolute; left: 50%; top: 70%; width: 24%; height: 14%;
      transform: translate(-50%,-50%) scaleY(.2);
      border-radius: 50%; background: #1a0908; opacity: 0; pointer-events: none;
      box-shadow: inset 0 -2px 4px rgba(200,50,40,.4);
    }
    .face-wrap.speaking .mouth {
      opacity: .95; animation: jaws .16s ease-in-out infinite;
    }
    @keyframes jaws {
      0%,100%{transform:translate(-50%,-50%) scaleY(.2) scaleX(1)}
      50%{transform:translate(-50%,-50%) scaleY(1.05) scaleX(1.08)}
    }

    .status {
      margin-top: 16px; text-align: center; max-width: 92vw;
      font-size: 22px; font-weight: 900; line-height: 1.25; color: var(--text);
      text-shadow: 0 2px 8px rgba(0,0,0,.8);
      min-height: 2.6em;
    }
    .hint {
      margin-top: 6px; text-align: center; color: var(--muted);
      font-size: 16px; font-weight: 700;
    }
    .record-btn {
      margin-top: 16px; min-width: min(90vw, 320px);
      padding: 18px 20px; border: 0; border-radius: 22px; cursor: pointer;
      background: var(--cyan); color: #041018; font-size: 22px; font-weight: 900;
    }
    .record-btn.hot {
      background: #ff6b00; color: #fff;
      box-shadow: 0 0 0 4px rgba(255,107,0,.25);
    }
    .record-btn:disabled { opacity: .55; cursor: default; }

    /* reply box always visible — no hidden chat fights */
    .reply {
      width: min(94vw, 520px); margin: 10px auto 12px; padding: 12px 14px;
      border-radius: 16px; background: var(--card); border: 1px solid rgba(0,212,255,.3);
      min-height: 56px; max-height: 18vh; overflow-y: auto;
      font-size: 17px; font-weight: 700; line-height: 1.35; color: var(--text);
    }
    .type-row {
      display: flex; gap: 8px; width: min(94vw, 520px); margin: 0 auto 16px;
      padding: 0 2px calc(10px + env(safe-area-inset-bottom));
    }
    .type-row input {
      flex: 1; padding: 14px 16px; border-radius: 18px;
      border: 1px solid rgba(0,212,255,.45); background: rgba(0,0,0,.4);
      color: #fff; font-size: 17px; font-weight: 700; outline: none;
    }
    .type-row button {
      width: 56px; border: 0; border-radius: 18px; background: var(--cyan);
      color: #041018; font-size: 20px; font-weight: 900; cursor: pointer;
    }

    /* open-site needs a real tap on iPhone */
    #openModal {
      display: none; position: fixed; inset: 0; z-index: 50;
      background: rgba(4,8,20,.86); align-items: center; justify-content: center; padding: 22px;
    }
    #openModal.on { display: flex; }
    #openModal .card {
      width: min(92vw, 380px); background: #0c152e; border: 2px solid rgba(0,212,255,.55);
      border-radius: 20px; padding: 20px; text-align: center;
    }
    #openModal h3 { margin: 0 0 8px; font-size: 22px; font-weight: 900; }
    #openModal p { margin: 0 0 16px; color: var(--muted); font-size: 16px; font-weight: 700; }
    #openModal .go {
      display: block; width: 100%; margin-bottom: 10px; padding: 16px; border: 0; border-radius: 16px;
      background: var(--cyan); color: #041018; font-size: 20px; font-weight: 900; cursor: pointer;
    }
    #openModal .no {
      display: block; width: 100%; padding: 12px; border-radius: 14px;
      border: 1px solid rgba(0,212,255,.4); background: transparent; color: var(--muted);
      font-size: 16px; font-weight: 800; cursor: pointer;
    }
    .error { color: var(--danger); }
  </style>
</head>
<body>
  <!-- LANDING -->
  <div id="landing">
    <img src="ashlyn-face.png?v=simple1" alt="Moof" />
    <h1>Moof</h1>
    <p>I'm Moof — Ashlyn's Brain. Tap the big button, talk, and I'll answer. Simple.</p>
    <input id="nameInput" maxlength="20" placeholder="Your name" autocomplete="nickname" />
    <select id="ageSelect">
      <option value="little">3–7 years</option>
      <option value="kid" selected>8–12 years</option>
      <option value="teen">13–17 years</option>
      <option value="adult">18+</option>
    </select>
    <button class="btn-primary" id="startBtn" type="button">Let's Go 🚀</button>
    <button class="btn-secondary" id="tapThroughBtn" type="button">🌈 Just Let Me Talk!</button>
  </div>

  <!-- MAIN -->
  <div id="app">
    <div class="top">
      <button type="button" id="whoBtn">👤 <span id="whoName">Friend</span></button>
      <span class="clock" id="clock"></span>
      <button type="button" id="helpBtn">Help</button>
    </div>

    <div class="stage">
      <div class="face-wrap idle" id="face" role="button" aria-label="Tap Moof to talk">
        <img src="ashlyn-face.png?v=simple1" alt="Moof" />
        <div class="mouth" aria-hidden="true"></div>
      </div>
      <div class="status" id="status">Tap HOLD TO TALK, then speak</div>
      <div class="hint" id="hint">Hold the orange/blue button while you talk</div>
      <button class="record-btn" id="recBtn" type="button">🎤 Hold to Talk</button>
    </div>

    <div class="reply" id="reply">Moof is ready.</div>
    <div class="type-row">
      <input id="textIn" placeholder="Or type here..." enterkeyhint="send" />
      <button type="button" id="sendBtn">➤</button>
    </div>
  </div>

  <div id="openModal" aria-hidden="true">
    <div class="card">
      <h3 id="openTitle">Open site?</h3>
      <p id="openMsg">iPhone needs one tap to open websites.</p>
      <button class="go" id="openGo" type="button">Open now</button>
      <button class="no" id="openNo" type="button">Not now</button>
    </div>
  </div>

<script>
(() => {
  'use strict';

  // ===== Tiny foolproof Moof =====
  const $ = (id) => document.getElementById(id);
  const landing = $('landing');
  const app = $('app');
  const face = $('face');
  const statusEl = $('status');
  const hintEl = $('hint');
  const replyEl = $('reply');
  const recBtn = $('recBtn');
  const textIn = $('textIn');
  const openModal = $('openModal');

  let profile = null;
  let busy = false;          // thinking / speaking / uploading
  let recording = false;
  let mediaRecorder = null;
  let mediaStream = null;
  let chunks = [];
  let mimeType = '';
  let history = [];
  let pendingUrl = '';

  const SITES = {
    youtube: 'https://youtube.com',
    google: 'https://google.com',
    netflix: 'https://netflix.com',
    facebook: 'https://facebook.com',
    instagram: 'https://instagram.com',
    amazon: 'https://amazon.com',
    weather: 'https://weather.com',
    wikipedia: 'https://wikipedia.org',
    chatgpt: 'https://chatgpt.com',
    disney: 'https://disneyplus.com'
  };

  const PROMPTS = {
    little: "You are Moof, a friendly orange cat who is Ashlyn's Brain for a young child (3-7). Be warm and simple. RULE: Reply in 1 short sentence. Never scary.",
    kid: "You are Moof, a playful orange cat who is Ashlyn's Brain for a child (8-12). Be kind and fun. RULE: Reply in 1-2 short sentences.",
    teen: "You are Moof, a snarky orange cat who is Ashlyn's Brain for a teen. Witty. RULE: Reply in 2 short sentences max.",
    adult: "You are Moof, Ashlyn's Brain as a snarky orange cat. RULE: Reply in 2 short sentences max."
  };

  function setStatus(t, isError) {
    statusEl.textContent = t;
    statusEl.className = 'status' + (isError ? ' error' : '');
  }
  function setReply(t) { replyEl.textContent = t || ''; }
  function setFace(state) {
    face.className = 'face-wrap ' + state;
  }
  function unlockSpeech() {
    try {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.resume();
      const u = new SpeechSynthesisUtterance('');
      u.volume = 0;
      window.speechSynthesis.speak(u);
    } catch (_) {}
  }

  function speak(text) {
    return new Promise((resolve) => {
      if (!window.speechSynthesis || !text) { resolve(); return; }
      try { window.speechSynthesis.cancel(); } catch (_) {}
      const u = new SpeechSynthesisUtterance(text);
      u.rate = profile && profile.ageGroup === 'little' ? 0.92 : 1.0;
      u.pitch = 1.25;
      const voices = window.speechSynthesis.getVoices() || [];
      const v = voices.find(x => /Samantha|Karen|Moira|Tessa|Zoe|Female/i.test(x.name)) ||
                voices.find(x => x.lang && x.lang.startsWith('en'));
      if (v) u.voice = v;
      let done = false;
      const finish = () => {
        if (done) return;
        done = true;
        setFace('idle');
        resolve();
      };
      u.onstart = () => setFace('speaking');
      u.onend = finish;
      u.onerror = finish;
      setFace('speaking'); // iOS often skips onstart
      try { window.speechSynthesis.speak(u); } catch (_) { finish(); return; }
      // failsafe
      setTimeout(() => {
        if (!done && !window.speechSynthesis.speaking) finish();
      }, Math.min(15000, 1200 + text.length * 60));
    });
  }

  function tickClock() {
    const d = new Date();
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    $('clock').textContent = days[d.getDay()] + ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  }

  function detectOpen(text) {
    const t = (text || '').toLowerCase().replace(/[?.!,]/g, ' ').replace(/\s+/g, ' ').trim();
    if (!t) return null;
    const intent = /\b(open|go to|go|visit|launch|show me|take me to|watch|play)\b/.test(t);
    for (const key of Object.keys(SITES)) {
      if (t.includes(key) && (intent || t === key || t.split(' ').length <= 3)) {
        return { key, url: SITES[key] };
      }
    }
    return null;
  }

  function showOpen(url, label) {
    pendingUrl = url;
    $('openTitle').textContent = 'Open ' + (label || 'site') + '?';
    $('openMsg').textContent = 'Tap Open now (iPhone needs one tap).';
    openModal.classList.add('on');
    openModal.setAttribute('aria-hidden', 'false');
  }
  function hideOpen() {
    openModal.classList.remove('on');
    openModal.setAttribute('aria-hidden', 'true');
    pendingUrl = '';
  }

  async function askAI(userText) {
    const age = (profile && profile.ageGroup) || 'kid';
    const name = (profile && profile.name) || 'friend';
    const now = new Date();
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'America/Chicago';
    let weatherExtra = '';
    if (/weather|temperature|forecast|rain|hot|cold|sunny/i.test(userText)) {
      try {
        const wr = await fetch('/api/web', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: 'weather Beaumont Texas' })
        });
        if (wr.ok) {
          const wj = await wr.json();
          if (wj.summary) weatherExtra = '\nWeather data: ' + wj.summary;
        }
      } catch (_) {}
    }
    const system =
      (PROMPTS[age] || PROMPTS.kid) +
      '\nUser name: ' + name +
      '\nUser is in Beaumont, Texas. Timezone: ' + tz +
      '\nDate/time: ' + now.toLocaleString() +
      weatherExtra +
      '\nIf useful fact needed you may start a line WEB_SEARCH: query — optional.';

    history.push({ role: 'user', content: userText });
    if (history.length > 6) history = history.slice(-6);

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'system', content: system }, ...history]
      })
    });
    if (!res.ok) throw new Error('chat ' + res.status);
    const data = await res.json();
    let reply = (data.reply || "Hmm, try again.").trim();

    if (reply.includes('WEB_SEARCH:')) {
      const m = reply.match(/WEB_SEARCH:\s*(.+)/);
      if (m) {
        const q = m[1].trim().split('\n')[0];
        reply = reply.replace(/WEB_SEARCH:.*$/s, '').trim();
        try {
          const wr = await fetch('/api/web', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: q })
          });
          if (wr.ok) {
            const wj = await wr.json();
            if (wj.summary) {
              const first = String(wj.summary).split(/(?<=[.!?])\s+/)[0];
              reply = (reply ? reply + ' ' : '') + (first || wj.summary).slice(0, 200);
            }
          }
        } catch (_) {}
      }
    }

    history.push({ role: 'assistant', content: reply });
    return reply;
  }

  async function handleUserText(text) {
    const cleaned = (text || '').trim();
    if (!cleaned || busy) return;
    busy = true;
    recBtn.disabled = true;

    // Website open?
    const site = detectOpen(cleaned);
    if (site) {
      setReply('Want to open ' + site.key + '?');
      setStatus('Tap Open now for ' + site.key);
      showOpen(site.url, site.key);
      await speak('Tap open now for ' + site.key);
      busy = false;
      recBtn.disabled = false;
      setFace('idle');
      return;
    }

    setFace('thinking');
    setStatus('🤔 Thinking...');
    setReply('You: ' + cleaned);
    try {
      const reply = await askAI(cleaned);
      setReply('Moof: ' + reply);
      setStatus('🎙️ Moof is talking...');
      await speak(reply);
      setStatus('Tap HOLD TO TALK when you want to speak');
      setFace('idle');
    } catch (e) {
      console.error(e);
      const msg = "My brain hiccuped. Try again.";
      setReply(msg);
      setStatus(msg, true);
      await speak(msg);
      setFace('idle');
    } finally {
      busy = false;
      recBtn.disabled = false;
    }
  }

  function pickMime() {
    if (!window.MediaRecorder) return '';
    const list = ['audio/mp4', 'audio/aac', 'audio/mp4;codecs=mp4a.40.2', 'audio/webm;codecs=opus', 'audio/webm'];
    for (const t of list) {
      try { if (MediaRecorder.isTypeSupported(t)) return t; } catch (_) {}
    }
    return '';
  }

  async function startRecord() {
    if (busy || recording) return;
    unlockSpeech();
    try { window.speechSynthesis && window.speechSynthesis.cancel(); } catch (_) {}

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setStatus('No microphone on this device — type instead.', true);
      return;
    }
    if (!window.MediaRecorder) {
      setStatus('Recording not supported — type instead.', true);
      return;
    }

    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) {
      console.error(e);
      setStatus('Allow Microphone, then hold the button again.', true);
      hintEl.textContent = 'iPhone: Settings → Safari (or this app) → Microphone → Allow';
      return;
    }

    chunks = [];
    mimeType = pickMime();
    try {
      mediaRecorder = mimeType
        ? new MediaRecorder(mediaStream, { mimeType })
        : new MediaRecorder(mediaStream);
    } catch (e) {
      try { mediaRecorder = new MediaRecorder(mediaStream); }
      catch (e2) {
        setStatus('Could not start recorder — type instead.', true);
        mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null;
        return;
      }
    }
    mimeType = mediaRecorder.mimeType || mimeType || 'audio/mp4';
    mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
    mediaRecorder.onstop = onRecordStop;
    try { mediaRecorder.start(200); }
    catch (_) {
      try { mediaRecorder.start(); } catch (e) {
        setStatus('Recorder failed — type instead.', true);
        cleanupStream();
        return;
      }
    }
    recording = true;
    setFace('listening');
    setStatus('Listening... talk now');
    hintEl.textContent = 'Release the button when done talking';
    recBtn.classList.add('hot');
    recBtn.textContent = '🔴 Listening — release to send';
  }

  function cleanupStream() {
    if (mediaStream) {
      mediaStream.getTracks().forEach(t => t.stop());
      mediaStream = null;
    }
    mediaRecorder = null;
    recording = false;
    recBtn.classList.remove('hot');
    recBtn.textContent = '🎤 Hold to Talk';
  }

  function stopRecord() {
    if (!recording || !mediaRecorder) return;
    recording = false;
    recBtn.classList.remove('hot');
    recBtn.textContent = '🎤 Hold to Talk';
    setStatus('Got it — sending...');
    setFace('thinking');
    try {
      if (mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    } catch (_) {
      cleanupStream();
    }
  }

  async function onRecordStop() {
    const blob = new Blob(chunks, { type: mimeType || 'audio/mp4' });
    cleanupStream();
    if (!blob.size || blob.size < 800) {
      setStatus('I did not catch that — hold and try again.', true);
      setFace('idle');
      return;
    }
    busy = true;
    recBtn.disabled = true;
    setStatus('📝 Transcribing...');
    try {
      const res = await fetch('/api/transcribe', {
        method: 'POST',
        headers: { 'Content-Type': blob.type || 'audio/mp4' },
        body: blob
      });
      if (!res.ok) throw new Error('transcribe ' + res.status);
      const data = await res.json();
      const text = (data.text || '').trim();
      if (!text) {
        setStatus('Did not catch words — try again closer to the mic.', true);
        setFace('idle');
        busy = false;
        recBtn.disabled = false;
        return;
      }
      setReply('You: ' + text);
      // busy will be managed inside handleUserText, so free then call
      busy = false;
      recBtn.disabled = false;
      await handleUserText(text);
    } catch (e) {
      console.error(e);
      setStatus('Transcription failed — type your question.', true);
      setFace('idle');
      busy = false;
      recBtn.disabled = false;
    }
  }

  async function startApp(name, ageGroup) {
    unlockSpeech();
    profile = { name: name || 'Friend', ageGroup: ageGroup || 'kid' };
    try { localStorage.setItem('moofProfile', JSON.stringify(profile)); } catch (_) {}
    $('whoName').textContent = profile.name;
    landing.style.display = 'none';
    app.classList.add('on');
    setFace('idle');
    setStatus('Hi ' + profile.name + '!');
    setReply('Moof is ready. Hold the mic button and talk.');
    hintEl.textContent = 'Hold the big button while you talk, then release';
    // Warm mic permission on this user gesture
    try {
      if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        const s = await navigator.mediaDevices.getUserMedia({ audio: true });
        s.getTracks().forEach(t => t.stop());
        setStatus('Mic ready — hold to talk');
      }
    } catch (_) {
      setStatus('When ready, hold mic and Allow if asked');
    }
    const greet = {
      little: 'Hi ' + profile.name + '! I am Moof. Hold the button and talk to me!',
      kid: 'Hey ' + profile.name + '! Moof here. Hold the mic button and ask me anything.',
      teen: 'Alright ' + profile.name + ', Moof online. Hold to talk.',
      adult: 'Hey ' + profile.name + '. Moof online. Hold to talk, or type below.'
    };
    await speak(greet[profile.ageGroup] || greet.kid);
    setStatus('Hold to talk — or type below');
    setFace('idle');
  }

  // ===== Wire UI =====
  $('startBtn').onclick = async () => {
    const name = $('nameInput').value.trim() || 'Friend';
    const age = $('ageSelect').value || 'kid';
    await startApp(name, age);
  };
  $('tapThroughBtn').onclick = async () => {
    const names = ['Sunshine', 'Star', 'Buddy', 'Princess'];
    await startApp(names[Math.floor(Math.random() * names.length)], 'little');
  };
  $('sendBtn').onclick = () => {
    const t = textIn.value.trim();
    if (!t) return;
    textIn.value = '';
    handleUserText(t);
  };
  textIn.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      $('sendBtn').click();
    }
  });
  $('helpBtn').onclick = () => {
    setStatus('Hold the big button, talk, release. Or type below.');
    speak('Hold the big button, talk, then release. Or type your question.');
  };
  $('whoBtn').onclick = () => {
    const n = prompt('Name?', profile ? profile.name : '');
    if (n && n.trim()) {
      profile.name = n.trim();
      try { localStorage.setItem('moofProfile', JSON.stringify(profile)); } catch (_) {}
      $('whoName').textContent = profile.name;
    }
  };

  // Hold-to-talk: pointer events cover mouse + touch cleanly
  const pressStart = (e) => {
    e.preventDefault();
    startRecord();
  };
  const pressEnd = (e) => {
    e.preventDefault();
    stopRecord();
  };
  recBtn.addEventListener('pointerdown', pressStart);
  recBtn.addEventListener('pointerup', pressEnd);
  recBtn.addEventListener('pointercancel', pressEnd);
  recBtn.addEventListener('pointerleave', () => { if (recording) stopRecord(); });
  // Face is a second hold target
  face.addEventListener('pointerdown', pressStart);
  face.addEventListener('pointerup', pressEnd);
  face.addEventListener('pointercancel', pressEnd);

  $('openGo').onclick = () => {
    if (!pendingUrl) return hideOpen();
    const url = pendingUrl;
    hideOpen();
    const w = window.open(url, '_blank', 'noopener,noreferrer');
    if (!w) {
      try {
        const a = document.createElement('a');
        a.href = url; a.target = '_blank'; a.rel = 'noopener noreferrer';
        document.body.appendChild(a); a.click(); a.remove();
      } catch (_) { window.location.href = url; }
    }
    setStatus('Opened!');
  };
  $('openNo').onclick = () => {
    hideOpen();
    setStatus('Okay, staying here.');
  };

  // Prefill landing
  try {
    const s = localStorage.getItem('moofProfile');
    if (s) {
      const p = JSON.parse(s);
      if (p.name) $('nameInput').value = p.name;
      if (p.ageGroup) $('ageSelect').value = p.ageGroup;
    }
  } catch (_) {}

  window.speechSynthesis && window.speechSynthesis.getVoices();
  if (window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }
  tickClock();
  setInterval(tickClock, 1000);

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
</script>
</body>
</html>
